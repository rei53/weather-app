<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>天気予報 | 都市名で今日の天気をチェック</title>
<style>
  :root {
    --primary: #0ea5e9;
    --primary-dark: #0284c7;
    --text: #1e293b;
    --text-light: #64748b;
    --border: #e2e8f0;
    --error: #dc2626;
    --error-bg: #fef2f2;
    --shadow: 0 10px 30px rgba(30, 41, 59, 0.08);
  }

  * {
    box-sizing: border-box;
  }

  body {
    margin: 0;
    min-height: 100vh;
    font-family: "Hiragino Kaku Gothic ProN", "Hiragino Sans", "Yu Gothic", "Noto Sans JP", system-ui, -apple-system, sans-serif;
    background: linear-gradient(160deg, #e0f2fe 0%, #f0f9ff 45%, #e0f2fe 100%);
    color: var(--text);
    display: flex;
    justify-content: center;
    padding: 32px 16px 60px;
  }

  .container {
    width: 100%;
    max-width: 560px;
  }

  header {
    text-align: center;
    margin-bottom: 28px;
  }

  header .icon {
    font-size: 40px;
    margin-bottom: 8px;
  }

  h1 {
    font-size: 22px;
    font-weight: 700;
    margin: 0 0 6px;
    letter-spacing: 0.02em;
  }

  header p {
    margin: 0;
    color: var(--text-light);
    font-size: 14px;
  }

  .card {
    background: #ffffff;
    border-radius: 20px;
    box-shadow: var(--shadow);
    padding: 28px 24px;
    border: 1px solid var(--border);
  }

  .search-row {
    display: flex;
    gap: 10px;
  }

  label {
    display: block;
    font-size: 13px;
    font-weight: 600;
    color: var(--text-light);
    margin-bottom: 8px;
  }

  .input-wrap {
    flex: 1;
    position: relative;
  }

  input[type="text"] {
    width: 100%;
    font-size: 18px;
    padding: 14px 16px;
    border: 2px solid var(--border);
    border-radius: 12px;
    outline: none;
    transition: border-color 0.15s ease, box-shadow 0.15s ease;
  }

  input[type="text"]:focus {
    border-color: var(--primary);
    box-shadow: 0 0 0 4px rgba(14, 165, 233, 0.12);
  }

  input[type="text"]::placeholder {
    color: #b7c0cf;
  }

  button {
    flex-shrink: 0;
    font-size: 16px;
    font-weight: 700;
    color: #fff;
    background: linear-gradient(135deg, var(--primary), var(--primary-dark));
    border: none;
    border-radius: 12px;
    padding: 0 24px;
    cursor: pointer;
    transition: transform 0.1s ease, box-shadow 0.15s ease, opacity 0.15s ease;
    box-shadow: 0 6px 16px rgba(14, 165, 233, 0.3);
    display: flex;
    align-items: center;
    gap: 6px;
  }

  button:hover {
    transform: translateY(-1px);
    box-shadow: 0 8px 20px rgba(14, 165, 233, 0.38);
  }

  button:active {
    transform: translateY(0);
  }

  button:disabled {
    opacity: 0.6;
    cursor: not-allowed;
    transform: none;
  }

  .geo-btn {
    margin-top: 12px;
    width: 100%;
    background: #fff;
    color: var(--primary-dark);
    border: 1.5px solid var(--primary);
    box-shadow: none;
    font-size: 14px;
    padding: 10px 0;
    justify-content: center;
  }

  .geo-btn:hover {
    background: #f0f9ff;
    transform: none;
  }

  .hint {
    margin-top: 10px;
    font-size: 12.5px;
    color: var(--text-light);
  }

  .result-area {
    margin-top: 24px;
    min-height: 4px;
  }

  .result-card {
    animation: fadeUp 0.35s ease;
    border-radius: 16px;
    padding: 24px 22px;
    background: linear-gradient(135deg, #f0f9ff, #f7fcff);
    border: 1px solid #d3ecfb;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .place-badge {
    display: inline-block;
    font-size: 13px;
    font-weight: 700;
    color: var(--primary-dark);
    background: #d3ecfb;
    padding: 4px 10px;
    border-radius: 999px;
    margin-bottom: 14px;
  }

  .current-row {
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .weather-icon {
    font-size: 56px;
    line-height: 1;
  }

  .temp-main {
    font-size: 44px;
    font-weight: 800;
    color: var(--text);
    line-height: 1;
  }

  .weather-desc {
    font-size: 15px;
    color: var(--text-light);
    margin-top: 4px;
  }

  .field-list {
    margin-top: 18px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }

  .field-row {
    background: #ffffffaa;
    border-radius: 10px;
    padding: 10px 12px;
    font-size: 13px;
  }

  .field-row .label {
    color: var(--text-light);
    font-weight: 600;
    display: block;
    margin-bottom: 2px;
  }

  .field-row .value {
    font-weight: 700;
    color: var(--text);
    font-size: 15px;
  }

  .forecast-strip {
    margin-top: 20px;
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 6px;
  }

  .forecast-day {
    text-align: center;
    background: #ffffffaa;
    border-radius: 10px;
    padding: 10px 4px;
  }

  .forecast-day .d-label {
    font-size: 11.5px;
    color: var(--text-light);
    font-weight: 600;
  }

  .forecast-day .d-icon {
    font-size: 22px;
    margin: 4px 0;
  }

  .forecast-day .d-temp {
    font-size: 12px;
    font-weight: 700;
  }

  .forecast-day .d-temp .lo {
    color: var(--text-light);
    font-weight: 500;
  }

  .message-card {
    animation: fadeUp 0.3s ease;
    text-align: center;
    padding: 28px 16px;
    border-radius: 16px;
  }

  .message-card.error {
    background: var(--error-bg);
    border: 1px solid #fecaca;
    color: var(--error);
  }

  .message-card.info {
    background: #f8fafc;
    border: 1px solid var(--border);
    color: var(--text-light);
  }

  .message-card .m-icon {
    font-size: 30px;
    display: block;
    margin-bottom: 10px;
  }

  .message-card .m-title {
    font-weight: 700;
    font-size: 15.5px;
    margin-bottom: 4px;
  }

  .message-card .m-sub {
    font-size: 13px;
    opacity: 0.85;
  }

  .candidate-list {
    margin-top: 6px;
    display: grid;
    gap: 8px;
  }

  .candidate-btn {
    width: 100%;
    text-align: left;
    background: #fff;
    color: var(--text);
    border: 1.5px solid var(--border);
    box-shadow: none;
    font-weight: 600;
    font-size: 14px;
    padding: 12px 14px;
    justify-content: flex-start;
  }

  .candidate-btn:hover {
    border-color: var(--primary);
    background: #f0f9ff;
    transform: none;
  }

  .candidate-btn .sub {
    font-weight: 400;
    color: var(--text-light);
    font-size: 12.5px;
    margin-left: 8px;
  }

  .spinner {
    width: 20px;
    height: 20px;
    border: 3px solid rgba(255,255,255,0.4);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  footer {
    text-align: center;
    margin-top: 22px;
    font-size: 12px;
    color: #94a3b8;
  }

  footer a {
    color: #94a3b8;
  }

  @media (max-width: 420px) {
    .search-row {
      flex-direction: column;
    }
    button {
      padding: 14px 0;
      justify-content: center;
    }
    .temp-main {
      font-size: 36px;
    }
    .weather-icon {
      font-size: 46px;
    }
    .card {
      padding: 22px 18px;
      border-radius: 16px;
    }
    .field-list {
      grid-template-columns: 1fr;
    }
  }
</style>
</head>
<body>
  <div class="container">
    <header>
      <div class="icon">⛅</div>
      <h1>天気予報</h1>
      <p>都市名を入れると今日の天気を表示します</p>
    </header>

    <div class="card">
      <label for="cityInput">都市名</label>
      <div class="search-row">
        <div class="input-wrap">
          <input
            id="cityInput"
            type="text"
            autocomplete="off"
            placeholder="例: 東京, 大阪, Tokyo, Paris"
          />
        </div>
        <button id="searchBtn" type="button">
          <span id="btnLabel">検索</span>
        </button>
      </div>
      <button class="geo-btn" id="geoBtn" type="button">📍 現在地の天気を見る</button>
      <div class="hint">日本語・英語どちらの都市名でも検索できます</div>

      <div class="result-area" id="resultArea"></div>
    </div>

    <footer>Powered by <a href="https://api.met.no/" target="_blank" rel="noopener">MET Norway</a> &amp; <a href="https://nominatim.org/" target="_blank" rel="noopener">OpenStreetMap</a></footer>
  </div>

<script>
  const cityInput = document.getElementById('cityInput');
  const searchBtn = document.getElementById('searchBtn');
  const geoBtn = document.getElementById('geoBtn');
  const btnLabel = document.getElementById('btnLabel');
  const resultArea = document.getElementById('resultArea');

  const SYMBOL_MAP = {
    clearsky: ['☀️', '快晴'],
    fair: ['🌤️', 'ほぼ晴れ'],
    partlycloudy: ['⛅', '晴れ時々くもり'],
    cloudy: ['☁️', 'くもり'],
    fog: ['🌫️', '霧'],
    rain: ['🌧️', '雨'],
    lightrain: ['🌦️', '弱い雨'],
    heavyrain: ['🌧️', '強い雨'],
    rainandthunder: ['⛈️', '雷雨'],
    lightrainandthunder: ['⛈️', '弱い雷雨'],
    heavyrainandthunder: ['⛈️', '激しい雷雨'],
    rainshowers: ['🌦️', 'にわか雨'],
    lightrainshowers: ['🌦️', '弱いにわか雨'],
    heavyrainshowers: ['🌧️', '強いにわか雨'],
    rainshowersandthunder: ['⛈️', '雷を伴うにわか雨'],
    lightrainshowersandthunder: ['⛈️', '雷を伴う弱いにわか雨'],
    heavyrainshowersandthunder: ['⛈️', '雷を伴う激しいにわか雨'],
    sleet: ['🌨️', 'みぞれ'],
    lightsleet: ['🌨️', '弱いみぞれ'],
    heavysleet: ['🌨️', '強いみぞれ'],
    sleetandthunder: ['⛈️', '雷を伴うみぞれ'],
    sleetshowers: ['🌨️', 'にわかみぞれ'],
    lightsleetshowers: ['🌨️', '弱いにわかみぞれ'],
    heavysleetshowers: ['🌨️', '強いにわかみぞれ'],
    snow: ['❄️', '雪'],
    lightsnow: ['🌨️', '弱い雪'],
    heavysnow: ['❄️', '強い雪'],
    snowandthunder: ['⛈️', '雷を伴う雪'],
    lightsnowandthunder: ['⛈️', '雷を伴う弱い雪'],
    heavysnowandthunder: ['⛈️', '雷を伴う強い雪'],
    snowshowers: ['🌨️', 'にわか雪'],
    lightsnowshowers: ['🌨️', '弱いにわか雪'],
    heavysnowshowers: ['🌨️', '強いにわか雪'],
    snowshowersandthunder: ['⛈️', '雷を伴うにわか雪']
  };

  function weatherFromSymbol(symbolCode) {
    if (!symbolCode) return ['🌡️', '不明'];
    const base = symbolCode.replace(/_day$|_night$|_polartwilight$/, '');
    return SYMBOL_MAP[base] || ['🌡️', '不明'];
  }

  function parseNominatimResult(r) {
    const parts = r.display_name.split(',').map(function (s) { return s.trim(); });
    return {
      name: parts[0],
      admin1: parts.length > 2 ? parts.slice(1, -1).join(', ') : '',
      country: parts.length > 1 ? parts[parts.length - 1] : '',
      latitude: parseFloat(r.lat),
      longitude: parseFloat(r.lon)
    };
  }

  function setLoading(isLoading) {
    searchBtn.disabled = isLoading;
    geoBtn.disabled = isLoading;
    if (isLoading) {
      btnLabel.innerHTML = '';
      const spinner = document.createElement('span');
      spinner.className = 'spinner';
      btnLabel.appendChild(spinner);
    } else {
      btnLabel.textContent = '検索';
    }
  }

  function renderMessage(icon, title, sub, type) {
    resultArea.innerHTML = '';
    const card = document.createElement('div');
    card.className = 'message-card ' + (type || 'info');
    const iconEl = document.createElement('span');
    iconEl.className = 'm-icon';
    iconEl.textContent = icon;
    const titleEl = document.createElement('div');
    titleEl.className = 'm-title';
    titleEl.textContent = title;
    const subEl = document.createElement('div');
    subEl.className = 'm-sub';
    subEl.textContent = sub;
    card.appendChild(iconEl);
    card.appendChild(titleEl);
    card.appendChild(subEl);
    resultArea.appendChild(card);
  }

  function renderCandidates(candidates) {
    resultArea.innerHTML = '';
    const wrap = document.createElement('div');
    wrap.className = 'message-card info';

    const iconEl = document.createElement('span');
    iconEl.className = 'm-icon';
    iconEl.textContent = '🔍';
    const titleEl = document.createElement('div');
    titleEl.className = 'm-title';
    titleEl.textContent = '候補が複数見つかりました';
    const subEl = document.createElement('div');
    subEl.className = 'm-sub';
    subEl.textContent = '表示したい場所を選んでください';

    wrap.appendChild(iconEl);
    wrap.appendChild(titleEl);
    wrap.appendChild(subEl);

    const list = document.createElement('div');
    list.className = 'candidate-list';

    candidates.forEach(function (c) {
      const btn = document.createElement('button');
      btn.type = 'button';
      btn.className = 'candidate-btn';
      const namePart = document.createTextNode(c.name);
      const subPart = document.createElement('span');
      subPart.className = 'sub';
      subPart.textContent = [c.admin1, c.country].filter(Boolean).join(', ');
      btn.appendChild(namePart);
      btn.appendChild(subPart);
      btn.addEventListener('click', function () {
        loadWeather(c);
      });
      list.appendChild(btn);
    });

    wrap.appendChild(list);
    resultArea.appendChild(wrap);
  }

  function buildForecast(timeseries) {
    const now = timeseries[0];
    const nowDetails = now.data.instant.details;
    const nowSymbol = (now.data.next_1_hours && now.data.next_1_hours.summary.symbol_code) ||
      (now.data.next_6_hours && now.data.next_6_hours.summary.symbol_code) ||
      (now.data.next_12_hours && now.data.next_12_hours.summary.symbol_code);

    const current = {
      time: now.time,
      temperature: nowDetails.air_temperature,
      windspeed: nowDetails.wind_speed * 3.6,
      winddirection: Math.round(nowDetails.wind_from_direction),
      humidity: nowDetails.relative_humidity,
      symbol: nowSymbol
    };

    const dayMap = new Map();
    timeseries.forEach(function (entry) {
      const d = new Date(entry.time);
      const dateKey = d.getFullYear() + '-' + (d.getMonth() + 1) + '-' + d.getDate();
      if (!dayMap.has(dateKey)) {
        dayMap.set(dateKey, { temps: [], symbolCandidates: [], dateObj: d });
      }
      const bucket = dayMap.get(dateKey);
      bucket.temps.push(entry.data.instant.details.air_temperature);
      const symbol = (entry.data.next_1_hours && entry.data.next_1_hours.summary.symbol_code) ||
        (entry.data.next_6_hours && entry.data.next_6_hours.summary.symbol_code);
      if (symbol) bucket.symbolCandidates.push({ hour: d.getHours(), symbol: symbol });
    });

    const days = Array.from(dayMap.values()).slice(0, 5).map(function (bucket) {
      let chosenSymbol = null;
      let bestDiff = Infinity;
      bucket.symbolCandidates.forEach(function (c) {
        const diff = Math.abs(c.hour - 12);
        if (diff < bestDiff) {
          bestDiff = diff;
          chosenSymbol = c.symbol;
        }
      });
      return {
        date: bucket.dateObj,
        max: Math.max.apply(null, bucket.temps),
        min: Math.min.apply(null, bucket.temps),
        symbol: chosenSymbol
      };
    });

    return { current: current, days: days };
  }

  function renderWeather(place, current, days) {
    resultArea.innerHTML = '';
    const card = document.createElement('div');
    card.className = 'result-card';

    const badge = document.createElement('div');
    badge.className = 'place-badge';
    badge.textContent = '📍 ' + [place.name, place.admin1, place.country].filter(Boolean).join(', ');
    card.appendChild(badge);

    const [icon, desc] = weatherFromSymbol(current.symbol);

    const row = document.createElement('div');
    row.className = 'current-row';

    const iconEl = document.createElement('div');
    iconEl.className = 'weather-icon';
    iconEl.textContent = icon;
    row.appendChild(iconEl);

    const tempWrap = document.createElement('div');
    const tempEl = document.createElement('div');
    tempEl.className = 'temp-main';
    tempEl.textContent = Math.round(current.temperature) + '℃';
    const descEl = document.createElement('div');
    descEl.className = 'weather-desc';
    descEl.textContent = desc;
    tempWrap.appendChild(tempEl);
    tempWrap.appendChild(descEl);
    row.appendChild(tempWrap);

    card.appendChild(row);

    const fieldList = document.createElement('div');
    fieldList.className = 'field-list';
    const fields = [
      ['湿度', Math.round(current.humidity) + ' %'],
      ['風速', Math.round(current.windspeed) + ' km/h'],
      ['最高/最低（今日）', days.length ? Math.round(days[0].max) + '℃ / ' + Math.round(days[0].min) + '℃' : '-'],
      ['観測時刻', new Date(current.time).toLocaleString('ja-JP', { month: 'numeric', day: 'numeric', hour: '2-digit', minute: '2-digit' })]
    ];
    fields.forEach(function (f) {
      const box = document.createElement('div');
      box.className = 'field-row';
      const label = document.createElement('span');
      label.className = 'label';
      label.textContent = f[0];
      const value = document.createElement('span');
      value.className = 'value';
      value.textContent = f[1];
      box.appendChild(label);
      box.appendChild(value);
      fieldList.appendChild(box);
    });
    card.appendChild(fieldList);

    const strip = document.createElement('div');
    strip.className = 'forecast-strip';
    const dayLabels = ['今日', '明日', '明後日'];
    days.forEach(function (day, i) {
      const dayEl = document.createElement('div');
      dayEl.className = 'forecast-day';

      const dLabel = document.createElement('div');
      dLabel.className = 'd-label';
      dLabel.textContent = dayLabels[i] || day.date.toLocaleDateString('ja-JP', { month: 'numeric', day: 'numeric' });

      const [dIcon] = weatherFromSymbol(day.symbol);
      const dIconEl = document.createElement('div');
      dIconEl.className = 'd-icon';
      dIconEl.textContent = dIcon;

      const dTemp = document.createElement('div');
      dTemp.className = 'd-temp';
      const hi = document.createElement('span');
      hi.textContent = Math.round(day.max) + '°';
      const lo = document.createElement('span');
      lo.className = 'lo';
      lo.textContent = ' / ' + Math.round(day.min) + '°';
      dTemp.appendChild(hi);
      dTemp.appendChild(lo);

      dayEl.appendChild(dLabel);
      dayEl.appendChild(dIconEl);
      dayEl.appendChild(dTemp);
      strip.appendChild(dayEl);
    });
    card.appendChild(strip);

    resultArea.appendChild(card);
  }

  async function loadWeather(place) {
    setLoading(true);
    resultArea.innerHTML = '';
    try {
      const url = 'https://api.met.no/weatherapi/locationforecast/2.0/compact?lat=' +
        place.latitude + '&lon=' + place.longitude;
      const res = await fetch(url);
      if (!res.ok) throw new Error('network');
      const data = await res.json();
      const timeseries = data.properties && data.properties.timeseries;
      if (!timeseries || timeseries.length === 0) {
        renderMessage('⚠️', '天気データを取得できませんでした', '時間をおいて再度お試しください', 'error');
        return;
      }
      const forecast = buildForecast(timeseries);
      renderWeather(place, forecast.current, forecast.days);
    } catch (err) {
      renderMessage('📡', '通信エラーが発生しました', 'ネットワーク接続を確認して再度お試しください', 'error');
    } finally {
      setLoading(false);
    }
  }

  async function search() {
    const query = cityInput.value.trim();

    if (query.length === 0) {
      renderMessage('✏️', '都市名を入力してください', '例: 東京, 大阪, Tokyo, Paris', 'info');
      return;
    }

    setLoading(true);
    resultArea.innerHTML = '';

    try {
      const geoUrl = 'https://nominatim.openstreetmap.org/search?q=' +
        encodeURIComponent(query) + '&format=json&limit=5&accept-language=ja';
      const geoRes = await fetch(geoUrl);
      if (!geoRes.ok) throw new Error('network');
      const geoResults = await geoRes.json();

      if (!geoResults || geoResults.length === 0) {
        renderMessage('🔍', '該当する都市が見つかりません', '「' + query + '」のスペルや表記を確認してください', 'error');
        return;
      }

      const places = geoResults.map(parseNominatimResult);

      if (places.length === 1) {
        await loadWeather(places[0]);
      } else {
        setLoading(false);
        renderCandidates(places);
      }
    } catch (err) {
      renderMessage('📡', '通信エラーが発生しました', 'ネットワーク接続を確認して再度お試しください', 'error');
      setLoading(false);
    } finally {
      if (searchBtn.disabled) setLoading(false);
    }
  }

  function useGeolocation() {
    if (!navigator.geolocation) {
      renderMessage('⚠️', '位置情報が利用できません', 'このブラウザは位置情報の取得に対応していません', 'error');
      return;
    }
    setLoading(true);
    resultArea.innerHTML = '';
    navigator.geolocation.getCurrentPosition(
      async function (pos) {
        const place = {
          name: '現在地',
          admin1: '',
          country: '',
          latitude: pos.coords.latitude,
          longitude: pos.coords.longitude
        };
        await loadWeather(place);
      },
      function () {
        setLoading(false);
        renderMessage('⚠️', '位置情報を取得できませんでした', 'ブラウザの位置情報の許可設定を確認してください', 'error');
      }
    );
  }

  searchBtn.addEventListener('click', search);
  geoBtn.addEventListener('click', useGeolocation);
  cityInput.addEventListener('keydown', function (e) {
    if (e.key === 'Enter') {
      search();
    }
  });

  cityInput.focus();
</script>
</body>
</html>
